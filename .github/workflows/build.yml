# GitHub Actions workflow for building OpenWrt firmware for CMCC PZ-L8
#
# Jobs:
#   check   - Gate: deduplicate push vs PR, skip drafts, check artifact cache
#   build   - Run build only when cache misses (skip on hit)
#   release - Create GitHub release with tagged artifacts (manual only)
#
# Trigger deduplication:
#   - push: cancelled if an open PR exists for the branch (PR CI will cover it)
#   - pull_request: draft PRs are cancelled entirely
#   - concurrency group uses branch name as additional safety net
#
# Cache key is based on repo build files only (variants, patches, scripts, build.sh),
# NOT on OpenWrt version or repo commit SHA. OpenWrt SHA is pinned in build.sh.
# All variants are always built (no variant selection).

name: Build OpenWrt for CMCC PZ-L8

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty for no release)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

env:
  TARGET: qualcommax
  SUBTARGET: ipq50xx
  DEVICE: cmcc_pz-l8

jobs:
  check:
    name: Check
    runs-on: ubuntu-22.04
    outputs:
      cache-hit: ${{ steps.artifact-cache.outputs.cache-hit }}
      build-key: ${{ steps.sig.outputs.key }}
      skip-build: ${{ steps.decide.outputs.skip-build }}
      skip-all: ${{ steps.gate.outputs.skip }}

    steps:
      - name: Gate - deduplicate push/PR, skip drafts
        id: gate
        run: |
          SKIP=false
          if [ "${{ github.event_name }}" = 'push' ]; then
            # Cancel if an open PR exists for this branch (PR CI will cover it)
            BRANCH="${GITHUB_REF_NAME}"
            PRS=$(curl -sf -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "${{ github.api_url }}/repos/${{ github.repository }}/pulls?head=${{ github.repository_owner }}:${BRANCH}&state=open" \
              | jq 'length')
            if [ "$PRS" -gt 0 ]; then
              SKIP=true
              echo "::notice::Cancelling push CI: $PRS open PR(s) for branch $BRANCH (PR CI will run instead)"
            fi
          elif [ "${{ github.event_name }}" = 'pull_request' ]; then
            # Extra safety: cancel draft PRs
            if [ "${{ github.event.pull_request.draft }}" = 'true' ]; then
              SKIP=true
              echo "::notice::Cancelling CI: draft PR"
            fi
          fi
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          if [ "$SKIP" = 'true' ]; then
            curl -sf -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "${{ github.api_url }}/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/cancel"
          fi

      - name: Checkout this repo
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Compute build signature
        if: steps.gate.outputs.skip != 'true'
        id: sig
        run: |
          INPUT_SIG="${{ hashFiles('variants/**', 'patches/**', 'scripts/**', 'build.sh') }}"
          echo "key=$INPUT_SIG" >> "$GITHUB_OUTPUT"

      - name: Try to restore cached artifacts
        if: steps.gate.outputs.skip != 'true'
        id: artifact-cache
        uses: actions/cache/restore@v4
        with:
          path: artifacts/
          key: firmware-${{ steps.sig.outputs.key }}

      - name: Decide whether to skip build
        if: steps.gate.outputs.skip != 'true'
        id: decide
        run: |
          if [ "${{ steps.artifact-cache.outputs.cache-hit }}" = 'true' ]; then
            echo "skip-build=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Cache hit (firmware-${{ steps.sig.outputs.key }}). Build will be skipped."
          else
            echo "skip-build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload cached artifacts (cache hit only)
        if: steps.gate.outputs.skip != 'true' && steps.artifact-cache.outputs.cache-hit == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: artifacts/
          retention-days: 1

      - name: Check summary
        if: steps.gate.outputs.skip != 'true'
        run: |
          echo "**Cache key**: \`firmware-${{ steps.sig.outputs.key }}\`" >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build
    needs: check
    if: needs.check.outputs.skip-all != 'true' && needs.check.outputs.skip-build != 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 720

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Show system info
        run: |
          echo "=== Disk ===" && df -h /
          echo "=== Memory ===" && free -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3-distutils \
            python3-setuptools python3-dev rsync swig unzip \
            zlib1g-dev file wget curl jq device-tree-compiler \
            ccache libelf-dev libdw-dev libiberty-dev zstd

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ env.TARGET }}-shared-v16-${{ hashFiles('variants/**', 'patches/**', 'build.sh') }}
          restore-keys: |
            ccache-${{ env.TARGET }}-shared-v16-

      - name: Cache dl (downloaded source tarballs)
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-${{ env.TARGET }}-v1-${{ hashFiles('variants/**', 'patches/**', 'build.sh') }}
          restore-keys: |
            dl-${{ env.TARGET }}-v1-

      - name: Build variants
        run: |
          chmod +x "$GITHUB_WORKSPACE/build.sh"
          "$GITHUB_WORKSPACE/build.sh" -c on -k "$GITHUB_WORKSPACE/openwrt"

      - name: Save artifacts to cache
        uses: actions/cache/save@v4
        with:
          path: artifacts/
          key: firmware-${{ needs.check.outputs.build-key }}

      - name: Build summary
        run: |
          echo "**Cache key**: \`firmware-${{ needs.check.outputs.build-key }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          find artifacts/ -type f | sort >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: artifacts/
          retention-days: 1

  release:
    name: Release
    needs: [check, build]
    if: needs.check.outputs.skip-all != 'true' && inputs.release_tag != ''
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: openwrt-firmware
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release

          for VARIANT_DIR in artifacts/*/; do
            VARIANT=$(basename "$VARIANT_DIR")
            for f in "$VARIANT_DIR"*-sysupgrade.bin; do
              [ -f "$f" ] && cp "$f" "release/openwrt-pz-l8-sysupgrade-$VARIANT.bin"
            done
            for f in "$VARIANT_DIR"*-factory.ubi; do
              [ -f "$f" ] && cp "$f" "release/openwrt-pz-l8-factory-$VARIANT.ubi"
            done
            for f in "$VARIANT_DIR"*-initramfs*.itb; do
              [ -f "$f" ] && cp "$f" "release/openwrt-pz-l8-initramfs-$VARIANT.itb"
            done
          done

          cd release
          sha256sum * > sha256sums
          ls -la

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag }}
          files: release/*
          body_path: .github/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
