# GitHub Actions workflow for building OpenWrt firmware for CMCC PZ-L8
# Builds all variants sequentially in a single job, sharing toolchain
# and compiled packages between builds to save runner time.
#
# The actual build logic lives in build.sh (shared with local builds).
# This workflow provides CI-specific infrastructure: disk cleanup,
# dependency installation, ccache caching, artifact upload, and releases.
#
# Config organization:
#   variants/ap/ap.config          - AP mode build config
#   variants/router/router.config  - Router mode build config
#   variants/ap/etc/uci-defaults/  - AP mode first-boot scripts
#   scripts/   - Build scripts (modify OpenWrt source tree)
#   patches/  - Kernel/device patches applied during build
#
# To add a new variant:
#   1. Create variants/<name>/<name>.config with desired packages
#   2. Create variants/<name>/etc/uci-defaults/ with any first-boot scripts
#   3. Add the variant name to the VARIANTS env variable below

name: Build OpenWrt for CMCC PZ-L8

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty for no release)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TARGET: qualcommax
  SUBTARGET: ipq50xx
  DEVICE: cmcc_pz-l8
  # Build variants (order matters: first = compiles toolchain + kernel + most packages)
  VARIANTS: "router ap"

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    timeout-minutes: 720

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Show system info
        run: |
          echo "=== Disk ===" && df -h /
          echo "=== Memory ===" && free -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3-distutils \
            python3-setuptools python3-dev rsync swig unzip \
            zlib1g-dev file wget curl jq device-tree-compiler \
            ccache libelf-dev libdw-dev libiberty-dev zstd

      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: main
          path: openwrt
          fetch-depth: 0

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ env.TARGET }}-shared-v15-${{ hashFiles('variants/*', 'patches/*', 'openwrt/feeds.conf.default') }}
          restore-keys: |
            ccache-${{ env.TARGET }}-shared-v15-

      - name: Build all variants
        run: |
          chmod +x "$GITHUB_WORKSPACE/build.sh"
          "$GITHUB_WORKSPACE/build.sh" -c on -k "$GITHUB_WORKSPACE/openwrt" ${{ env.VARIANTS }}

      - name: Show ccache stats
        run: ccache -s

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: artifacts/
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    if: inputs.release_tag != ''

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: openwrt-firmware
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release

          for VARIANT in ${{ env.VARIANTS }}; do
            for f in artifacts/$VARIANT/*-sysupgrade.bin; do
              [ -f "$f" ] && cp "$f" "release/openwrt-pz-l8-sysupgrade-$VARIANT.bin"
            done
            for f in artifacts/$VARIANT/*-factory.ubi; do
              [ -f "$f" ] && cp "$f" "release/openwrt-pz-l8-factory-$VARIANT.ubi"
            done
            for f in artifacts/$VARIANT/*-initramfs*.itb; do
              [ -f "$f" ] && cp "$f" "release/openwrt-pz-l8-initramfs-$VARIANT.itb"
            done
          done

          cd release
          sha256sum * > sha256sums
          ls -la

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag }}
          files: release/*
          body_path: .github/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
