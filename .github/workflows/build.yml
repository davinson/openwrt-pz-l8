# GitHub Actions workflow for building OpenWrt firmware for CMCC PZ-L8
# Builds all variants sequentially in a single job, sharing toolchain
# and compiled packages between builds to save runner time.
#
# The actual build logic lives in build.sh (shared with local builds).
# This workflow provides CI-specific infrastructure: disk cleanup,
# dependency installation, ccache caching, artifact upload, and releases.
#
# Config organization:
#   variants/*/build.config       - Build configs (auto-discovered by build.sh)
#   variants/*/etc/uci-defaults/  - First-boot scripts
#   scripts/   - Build scripts (modify OpenWrt source tree)
#   patches/  - Kernel/device patches applied during build
#
# To add a new variant:
#   1. Create variants/<name>/build.config with desired packages
#   2. Create variants/<name>/etc/uci-defaults/ with any first-boot scripts
#   3. No other changes needed - build.sh auto-discovers variants

name: Build OpenWrt for CMCC PZ-L8

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Variant to build (leave empty for all: ap, router)'
        required: false
        default: ''
      release_tag:
        description: 'Release tag (leave empty for no release)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TARGET: qualcommax
  SUBTARGET: ipq50xx
  DEVICE: cmcc_pz-l8

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-22.04
    steps:
      - name: Check inputs
        run: |
          if [ -n "${{ inputs.release_tag }}" ] && [ -n "${{ inputs.variant }}" ]; then
            echo "ERROR: Release builds require all variants (variant must be empty)."
            exit 1
          fi

  build:
    name: Build
    needs: validate
    runs-on: ubuntu-22.04
    timeout-minutes: 720

    steps:
      # Light steps first: checkout to compute cache key
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: main
          path: openwrt
          fetch-depth: 1

      - name: Compute build signature
        id: sig
        run: |
          OPENWRT_SHA=$(cd openwrt && git rev-parse HEAD)
          REPO_SHA=$(git rev-parse HEAD)
          SIG="${OPENWRT_SHA:0:12}-${REPO_SHA:0:12}"
          echo "key=$SIG" >> "$GITHUB_OUTPUT"
          echo "openwrt=${OPENWRT_SHA:0:12}" >> "$GITHUB_OUTPUT"
          echo "repo=${REPO_SHA:0:12}" >> "$GITHUB_OUTPUT"

      - name: Try to restore cached artifacts
        id: artifact-cache
        uses: actions/cache/restore@v4
        with:
          path: artifacts/
          key: firmware-${{ steps.sig.outputs.key }}

      # Heavy steps only when cache misses
      - name: Free disk space
        if: steps.artifact-cache.outputs.cache-hit != 'true'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Show system info
        if: steps.artifact-cache.outputs.cache-hit != 'true'
        run: |
          echo "=== Disk ===" && df -h /
          echo "=== Memory ===" && free -h

      - name: Install dependencies
        if: steps.artifact-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3-distutils \
            python3-setuptools python3-dev rsync swig unzip \
            zlib1g-dev file wget curl jq device-tree-compiler \
            ccache libelf-dev libdw-dev libiberty-dev zstd

      - name: Cache ccache
        if: steps.artifact-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ env.TARGET }}-shared-v16-${{ hashFiles('variants/*', 'patches/*', 'openwrt/feeds.conf.default') }}
          restore-keys: |
            ccache-${{ env.TARGET }}-shared-v16-

      - name: Cache dl (downloaded source tarballs)
        if: steps.artifact-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-${{ env.TARGET }}-v1-${{ hashFiles('openwrt/feeds.conf.default', 'variants/*') }}
          restore-keys: |
            dl-${{ env.TARGET }}-v1-

      - name: Build variants
        if: steps.artifact-cache.outputs.cache-hit != 'true'
        run: |
          chmod +x "$GITHUB_WORKSPACE/build.sh"
          VARIANT="${{ inputs.variant || '' }}"
          if [ -z "$VARIANT" ]; then
            "$GITHUB_WORKSPACE/build.sh" -c on -k "$GITHUB_WORKSPACE/openwrt"
          else
            "$GITHUB_WORKSPACE/build.sh" -c on -k "$GITHUB_WORKSPACE/openwrt" "$VARIANT"
          fi

      - name: Save artifacts to cache (full build only)
        if: steps.artifact-cache.outputs.cache-hit != 'true' && (inputs.variant == '' || inputs.variant == 'all')
        uses: actions/cache/save@v4
        with:
          path: artifacts/
          key: firmware-${{ steps.sig.outputs.key }}

      - name: Show ccache stats
        if: steps.artifact-cache.outputs.cache-hit != 'true'
        run: ccache -s

      - name: Build summary
        run: |
          if [ "${{ steps.artifact-cache.outputs.cache-hit }}" = 'true' ]; then
            echo "## 🎉 Cache Hit - Build Skipped" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## 🔨 Build Completed" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source | Commit |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **OpenWrt** | \`${{ steps.sig.outputs.openwrt }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Repo** | \`${{ steps.sig.outputs.repo }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Variant** | \`${{ inputs.variant || 'all' }}\` |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.artifact-cache.outputs.cache-hit }}" = 'true' ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            find artifacts/ -type f | sort >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| **Build key** | \`firmware-${{ steps.sig.outputs.key }}\` |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: artifacts/
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    if: inputs.release_tag != ''

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: openwrt-firmware
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release

          for VARIANT_DIR in artifacts/*/; do
            VARIANT=$(basename "$VARIANT_DIR")
            for f in "$VARIANT_DIR"*-sysupgrade.bin; do
              [ -f "$f" ] && cp "$f" "release/openwrt-pz-l8-sysupgrade-$VARIANT.bin"
            done
            for f in "$VARIANT_DIR"*-factory.ubi; do
              [ -f "$f" ] && cp "$f" "release/openwrt-pz-l8-factory-$VARIANT.ubi"
            done
            for f in "$VARIANT_DIR"*-initramfs*.itb; do
              [ -f "$f" ] && cp "$f" "release/openwrt-pz-l8-initramfs-$VARIANT.itb"
            done
          done

          cd release
          sha256sum * > sha256sums
          ls -la

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag }}
          files: release/*
          body_path: .github/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
