# GitHub Actions workflow for building OpenWrt firmware for CMCC PZ-L8
# Builds Router then AP sequentially in a single job, sharing toolchain
# and compiled packages to save ~35% total runner time.
#
# Config organization:
#   variants/ap/ap.config          - AP mode build config
#   variants/router/router.config  - Router mode build config
#   variants/ap/etc/uci-defaults/  - AP mode first-boot scripts
#   scripts/   - CI build scripts (modify OpenWrt source tree)
#   patches/  - Kernel/device patches applied during build
#
# To add a new variant:
#   1. Create variants/<name>/<name>.config with desired packages
#   2. Create variants/<name>/etc/uci-defaults/ with any first-boot scripts
#   3. Add a build + collect-artifacts block in the build job

name: Build OpenWrt for CMCC PZ-L8

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty for no release)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TARGET: qualcommax
  SUBTARGET: ipq50xx
  DEVICE: cmcc_pz-l8
  # Pinned commit SHAs (update when upstream changes)
  PR_21495_SHA: d4286eec1828e4843bceaccc400846854fa46955
  BDF_COMMIT: f7ad5fee1924efdb5d8b2d1bf95bd3867d22e701

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    timeout-minutes: 720

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Show system info
        run: |
          echo "=== Disk ===" && df -h /
          echo "=== Memory ===" && free -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3-distutils \
            python3-setuptools python3-dev rsync swig unzip \
            zlib1g-dev file wget curl jq device-tree-compiler \
            ccache libelf-dev libdw-dev libiberty-dev zstd

      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: main
          path: openwrt
          fetch-depth: 0

      - name: "Merge PR #21495 and fix caldata"
        working-directory: openwrt
        run: |
          git config user.email "builder@github.com"
          git config user.name "GitHub Actions"

          # Fetch and merge PR #21495 into main (stay on main, don't checkout PR branch)
          git fetch origin ${{ env.PR_21495_SHA }}
          if ! git merge FETCH_HEAD --no-edit; then
            echo "=== Merge conflicts detected (expected for caldata) ==="
            CALDATA=target/linux/qualcommax/ipq50xx/base-files/etc/hotplug.d/firmware/11-ath11k-caldata
            # Take main's caldata (has latest device entries), fix-caldata.sh will insert PZ-L8
            git checkout --ours "$CALDATA"
            git add "$CALDATA"
            git commit --no-edit --no-verify
            echo "=== Caldata conflict resolved (using main version) ==="
          fi

          # Verify pinned commit is in history
          if ! git log --oneline | grep -q "d4286eec"; then
            echo "ERROR: Pinned PR #21495 commit d4286eec not found."
            exit 1
          fi

          # Insert PZ-L8 caldata entries with review-approved settings
          CALDATA=target/linux/qualcommax/ipq50xx/base-files/etc/hotplug.d/firmware/11-ath11k-caldata
          chmod +x "$GITHUB_WORKSPACE/.github/scripts/fix-caldata.sh"
          "$GITHUB_WORKSPACE/.github/scripts/fix-caldata.sh" "$CALDATA"

      - name: "Add FM25LS01 SPI NAND support (V2 hardware)"
        working-directory: openwrt
        run: |
          PATCH_DIR=target/linux/generic/backport-6.12
          PATCH_SRC="$GITHUB_WORKSPACE/patches/add-fm25ls01-support.patch"
          PATCH_DST="$PATCH_DIR/440-v6.12-mtd-spinand-add-support-for-FudanMicro-FM25LS01.patch"

          if [ ! -f "$PATCH_SRC" ]; then
            echo "ERROR: FM25LS01 patch not found at $PATCH_SRC"
            exit 1
          fi

          cp "$PATCH_SRC" "$PATCH_DST"
          echo "=== FM25LS01 patch installed ==="
          ls -la "$PATCH_DST"

      - name: Download BDF files for PZ-L8 WiFi
        working-directory: openwrt
        run: |
          mkdir -p files/lib/firmware/ath11k/IPQ5018/hw1.0
          mkdir -p files/lib/firmware/ath11k/QCN6122/hw1.0

          curl -L -o files/lib/firmware/ath11k/IPQ5018/hw1.0/board-2.bin \
            "https://github.com/openwrt/firmware_qca-wireless/raw/${{ env.BDF_COMMIT }}/board-cmcc_pz-l8.ipq5018"

          curl -L -o files/lib/firmware/ath11k/QCN6122/hw1.0/board-2.bin \
            "https://github.com/openwrt/firmware_qca-wireless/raw/${{ env.BDF_COMMIT }}/board-cmcc_pz-l8.qcn6122"

          echo "=== BDF files ==="
          ls -la files/lib/firmware/ath11k/IPQ5018/hw1.0/
          ls -la files/lib/firmware/ath11k/QCN6122/hw1.0/

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ env.TARGET }}-shared-v14-${{ hashFiles('variants/*', 'patches/*', 'openwrt/feeds.conf.default') }}
          restore-keys: |
            ccache-${{ env.TARGET }}-shared-v14-

      - name: Configure ccache
        run: |
          ccache --set-config=cache_dir=~/.ccache
          ccache --set-config=max_size=10G
          ccache --set-config=compression=true
          ccache -z

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ── Download precompiled toolchain (saves ~20-25min) ────────
      # Tries to download the snapshot toolchain; falls back to
      # compilation if download fails.

      - name: Download precompiled toolchain
        working-directory: openwrt
        continue-on-error: true
        run: |
          TOOLCHAIN_URL="https://downloads.openwrt.org/snapshots/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/"
          TOOLCHAIN_FILE=$(curl -sL "$TOOLCHAIN_URL" | grep -oP 'openwrt-toolchain[^"]+tar\.zst' | head -1)

          if [ -z "$TOOLCHAIN_FILE" ]; then
            echo "No toolchain found at $TOOLCHAIN_URL, will compile from source"
            exit 1
          fi

          echo "Downloading $TOOLCHAIN_FILE ..."
          curl -LO "${TOOLCHAIN_URL}${TOOLCHAIN_FILE}"
          tar --zstd -xf "$TOOLCHAIN_FILE"
          rm -f "$TOOLCHAIN_FILE"

          echo "=== Precompiled toolchain extracted ==="

      # ── Build Router (first) ──────────────────────────────────
      # Router has the most packages; building it first compiles the
      # common toolchain + kernel + shared packages that AP reuses.

      - name: "Router: copy overlay files"
        run: |
          VARIANT_DIR="$GITHUB_WORKSPACE/variants/router"
          if [ -d "$VARIANT_DIR/etc" ]; then
            cp -r "$VARIANT_DIR/etc" openwrt/files/
            echo "=== Copied overlay files from $VARIANT_DIR/etc ==="
            find openwrt/files/ -type f | sort
          else
            echo "No overlay files for Router mode"
          fi

      - name: "Router: generate configuration"
        working-directory: openwrt
        run: |
          cp "$GITHUB_WORKSPACE/variants/router/router.config" .config
          make defconfig
          make defconfig

      - name: "Router: download sources"
        working-directory: openwrt
        run: |
          for i in 1 2 3; do
            echo "Download attempt $i/3..."
            if make download -j$(nproc) V=s; then break; fi
            [ $i -eq 3 ] && exit 1
            sleep 30
          done

      - name: "Router: build"
        working-directory: openwrt
        run: make -j$(nproc) V=w || make -j1 V=w || make -j1 V=s

      - name: "Router: collect artifacts"
        run: |
          mkdir -p artifacts/router
          cp -v openwrt/bin/targets/qualcommax/ipq50xx/*factory*.ubi artifacts/router/ 2>/dev/null || echo "No factory.ubi found"
          cp -v openwrt/bin/targets/qualcommax/ipq50xx/*sysupgrade*.bin artifacts/router/ 2>/dev/null || echo "No sysupgrade.bin found"
          echo "=== Router artifacts ==="
          ls -lh artifacts/router/

      # ── Build AP (second, reuses compiled packages) ────────────

      - name: "AP: copy overlay files"
        run: |
          VARIANT_DIR="$GITHUB_WORKSPACE/variants/ap"
          if [ -d "$VARIANT_DIR/etc" ]; then
            cp -r "$VARIANT_DIR/etc" openwrt/files/
            echo "=== Copied overlay files from $VARIANT_DIR/etc ==="
            find openwrt/files/ -type f | sort
          else
            echo "No overlay files for AP mode"
          fi

      - name: "AP: generate configuration"
        working-directory: openwrt
        run: |
          cp "$GITHUB_WORKSPACE/variants/ap/ap.config" .config
          make defconfig
          make defconfig

      - name: "AP: download sources"
        working-directory: openwrt
        run: |
          for i in 1 2 3; do
            echo "Download attempt $i/3..."
            if make download -j$(nproc) V=s; then break; fi
            [ $i -eq 3 ] && exit 1
            sleep 30
          done

      - name: "AP: build (reuses toolchain + shared packages)"
        working-directory: openwrt
        run: make -j$(nproc) V=w || make -j1 V=w || make -j1 V=s

      - name: "AP: collect artifacts"
        run: |
          mkdir -p artifacts/ap
          cp -v openwrt/bin/targets/qualcommax/ipq50xx/*factory*.ubi artifacts/ap/ 2>/dev/null || echo "No factory.ubi found"
          cp -v openwrt/bin/targets/qualcommax/ipq50xx/*sysupgrade*.bin artifacts/ap/ 2>/dev/null || echo "No sysupgrade.bin found"
          echo "=== AP artifacts ==="
          ls -lh artifacts/ap/

      # ── Finalize ──────────────────────────────────────────────

      - name: Show ccache stats
        run: ccache -s

      - name: Generate build info
        run: |
          cat > artifacts/BUILD_INFO.txt << EOF
          Build: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          Target: ${{ env.TARGET }}/${{ env.SUBTARGET }}
          Device: ${{ env.DEVICE }}
          Branch: main
          Patches: PR #21495 (${{ env.PR_21495_SHA }}), FM25LS01 SPI NAND
          EOF
          echo "=== All artifacts ==="
          find artifacts/ -type f | sort

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: artifacts/
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    if: inputs.release_tag != ''

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: openwrt-firmware
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release

          for f in artifacts/ap/*-sysupgrade.bin; do
            [ -f "$f" ] && cp "$f" "release/openwrt-pz-l8-sysupgrade-ap.bin"
          done
          for f in artifacts/ap/*-factory.ubi; do
            [ -f "$f" ] && cp "$f" "release/openwrt-pz-l8-factory-ap.ubi"
          done

          for f in artifacts/router/*-sysupgrade.bin; do
            [ -f "$f" ] && cp "$f" "release/openwrt-pz-l8-sysupgrade-router.bin"
          done
          for f in artifacts/router/*-factory.ubi; do
            [ -f "$f" ] && cp "$f" "release/openwrt-pz-l8-factory-router.ubi"
          done

          cd release
          sha256sum * > sha256sums
          ls -la

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag }}
          files: release/*
          body_path: .github/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
