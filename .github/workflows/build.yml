# GitHub Actions workflow for building OpenWrt firmware for CMCC PZ-L8
# Builds all variants sequentially in a single job, sharing toolchain
# and compiled packages between builds to save runner time.
#
# Config organization:
#   variants/ap/ap.config          - AP mode build config
#   variants/router/router.config  - Router mode build config
#   variants/ap/etc/uci-defaults/  - AP mode first-boot scripts
#   scripts/   - CI build scripts (modify OpenWrt source tree)
#   patches/  - Kernel/device patches applied during build
#
# To add a new variant:
#   1. Create variants/<name>/<name>.config with desired packages
#   2. Create variants/<name>/etc/uci-defaults/ with any first-boot scripts
#   3. Add the variant name to the VARIANTS env variable below

name: Build OpenWrt for CMCC PZ-L8

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty for no release)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TARGET: qualcommax
  SUBTARGET: ipq50xx
  DEVICE: cmcc_pz-l8
  # Build variants (order matters: first = compiles toolchain + kernel + most packages)
  VARIANTS: "router ap"
  # Pinned commit SHAs (update when upstream changes)
  PR_21495_SHA: d4286eec1828e4843bceaccc400846854fa46955
  BDF_COMMIT: f7ad5fee1924efdb5d8b2d1bf95bd3867d22e701

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    timeout-minutes: 720

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Show system info
        run: |
          echo "=== Disk ===" && df -h /
          echo "=== Memory ===" && free -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3-distutils \
            python3-setuptools python3-dev rsync swig unzip \
            zlib1g-dev file wget curl jq device-tree-compiler \
            ccache libelf-dev libdw-dev libiberty-dev zstd

      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: main
          path: openwrt
          fetch-depth: 0

      - name: "Merge PR #21495 and fix caldata"
        working-directory: openwrt
        run: |
          git config user.email "builder@github.com"
          git config user.name "GitHub Actions"

          git fetch origin ${{ env.PR_21495_SHA }}
          if ! git merge FETCH_HEAD --no-edit; then
            echo "=== Merge conflicts detected (expected for caldata) ==="
            CALDATA=target/linux/qualcommax/ipq50xx/base-files/etc/hotplug.d/firmware/11-ath11k-caldata
            git checkout --ours "$CALDATA"
            git add "$CALDATA"
            git commit --no-edit --no-verify
            echo "=== Caldata conflict resolved (using main version) ==="
          fi

          if ! git log --oneline | grep -q "d4286eec"; then
            echo "ERROR: Pinned PR #21495 commit d4286eec not found."
            exit 1
          fi

          CALDATA=target/linux/qualcommax/ipq50xx/base-files/etc/hotplug.d/firmware/11-ath11k-caldata
          chmod +x "$GITHUB_WORKSPACE/scripts/fix-caldata.sh"
          "$GITHUB_WORKSPACE/scripts/fix-caldata.sh" "$CALDATA"

      - name: "Add FM25LS01 SPI NAND support (V2 hardware)"
        working-directory: openwrt
        run: |
          PATCH_DIR=target/linux/generic/backport-6.12
          PATCH_SRC="$GITHUB_WORKSPACE/patches/add-fm25ls01-support.patch"
          PATCH_DST="$PATCH_DIR/440-v6.12-mtd-spinand-add-support-for-FudanMicro-FM25LS01.patch"

          if [ ! -f "$PATCH_SRC" ]; then
            echo "ERROR: FM25LS01 patch not found at $PATCH_SRC"
            exit 1
          fi

          cp "$PATCH_SRC" "$PATCH_DST"
          echo "=== FM25LS01 patch installed ==="
          ls -la "$PATCH_DST"

      - name: Download BDF files for PZ-L8 WiFi
        working-directory: openwrt
        run: |
          mkdir -p files/lib/firmware/ath11k/IPQ5018/hw1.0
          mkdir -p files/lib/firmware/ath11k/QCN6122/hw1.0

          curl -L -o files/lib/firmware/ath11k/IPQ5018/hw1.0/board-2.bin \
            "https://github.com/openwrt/firmware_qca-wireless/raw/${{ env.BDF_COMMIT }}/board-cmcc_pz-l8.ipq5018"
          curl -L -o files/lib/firmware/ath11k/QCN6122/hw1.0/board-2.bin \
            "https://github.com/openwrt/firmware_qca-wireless/raw/${{ env.BDF_COMMIT }}/board-cmcc_pz-l8.qcn6122"

          echo "=== BDF files ==="
          ls -la files/lib/firmware/ath11k/IPQ5018/hw1.0/
          ls -la files/lib/firmware/ath11k/QCN6122/hw1.0/

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ env.TARGET }}-shared-v15-${{ hashFiles('variants/*', 'patches/*', 'openwrt/feeds.conf.default') }}
          restore-keys: |
            ccache-${{ env.TARGET }}-shared-v15-

      - name: Configure ccache
        run: |
          ccache --set-config=cache_dir=~/.ccache
          ccache --set-config=max_size=10G
          ccache --set-config=compression=true
          ccache -z

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Download precompiled toolchain
        working-directory: openwrt
        continue-on-error: true
        run: |
          TOOLCHAIN_URL="https://downloads.openwrt.org/snapshots/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/"
          TOOLCHAIN_FILE=$(curl -sL "$TOOLCHAIN_URL" | grep -oP 'openwrt-toolchain[^"]+tar\.zst' | head -1)

          if [ -z "$TOOLCHAIN_FILE" ]; then
            echo "No toolchain found at $TOOLCHAIN_URL, will compile from source"
            exit 1
          fi

          echo "Downloading $TOOLCHAIN_FILE ..."
          curl -LO "${TOOLCHAIN_URL}${TOOLCHAIN_FILE}"
          tar --zstd -xf "$TOOLCHAIN_FILE"
          rm -f "$TOOLCHAIN_FILE"

          echo "=== Precompiled toolchain extracted ==="

      - name: Build all variants
        working-directory: openwrt
        run: |
          VARIANT_COUNT=$(echo "${{ env.VARIANTS }}" | wc -w)
          VARIANT_IDX=0

          for VARIANT in ${{ env.VARIANTS }}; do
            VARIANT_IDX=$((VARIANT_IDX + 1))
            echo ""
            echo "============================================================"
            echo "=== [$VARIANT_IDX/$VARIANT_COUNT] Building variant: $VARIANT ==="
            echo "============================================================"

            VARIANT_DIR="$GITHUB_WORKSPACE/variants/$VARIANT"
            ARTIFACT_DIR="$GITHUB_WORKSPACE/artifacts/$VARIANT"
            mkdir -p "$ARTIFACT_DIR"

            # 1. Copy overlay files (clear previous variant's files first)
            rm -rf files/etc 2>/dev/null
            if [ -d "$VARIANT_DIR/etc" ]; then
              cp -r "$VARIANT_DIR/etc" files/
              echo "--- Copied overlay files ---"
              find files/etc -type f | sort
            fi

            # 2. Generate configuration
            cp "$VARIANT_DIR/$VARIANT.config" .config
            make defconfig
            make defconfig

            # 3. Download sources
            for i in 1 2 3; do
              echo "Download attempt $i/3..."
              if make download -j$(nproc) V=s; then break; fi
              [ $i -eq 3 ] && exit 1
              sleep 30
            done

            # 4. Build
            make -j$(nproc) V=w || make -j1 V=w || make -j1 V=s

            # 5. Collect artifacts
            cp -v bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*factory*.ubi "$ARTIFACT_DIR/" 2>/dev/null || true
            cp -v bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*sysupgrade*.bin "$ARTIFACT_DIR/" 2>/dev/null || true
            cp -v bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*initramfs*.itb "$ARTIFACT_DIR/" 2>/dev/null || true
            echo "--- Artifacts for $VARIANT ---"
            ls -lh "$ARTIFACT_DIR/"

            echo "=== [$VARIANT_IDX/$VARIANT_COUNT] $VARIANT done ==="
          done

      - name: Show ccache stats
        run: ccache -s

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: artifacts/
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    if: inputs.release_tag != ''

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: openwrt-firmware
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release

          for VARIANT in ${{ env.VARIANTS }}; do
            for f in artifacts/$VARIANT/*-sysupgrade.bin; do
              [ -f "$f" ] && cp "$f" "release/openwrt-pz-l8-sysupgrade-$VARIANT.bin"
            done
            for f in artifacts/$VARIANT/*-factory.ubi; do
              [ -f "$f" ] && cp "$f" "release/openwrt-pz-l8-factory-$VARIANT.ubi"
            done
            for f in artifacts/$VARIANT/*-initramfs*.itb; do
              [ -f "$f" ] && cp "$f" "release/openwrt-pz-l8-initramfs-$VARIANT.itb"
            done
          done

          cd release
          sha256sum * > sha256sums
          ls -la

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag }}
          files: release/*
          body_path: .github/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
