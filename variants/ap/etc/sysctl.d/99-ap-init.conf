# AP bridge mode: accept upstream IPv6 RA
#
# OpenWrt defaults to router-mode sysctl values (forwarding=1, accept_ra=0),
# which prevents a bridge AP from receiving upstream RA - leaving it with
# only link-local IPv6 (fe80::) and no IPv6 default route.
#
# Only 2 sysctl changes are needed:
#   - all.forwarding = 0: disable IPv6 routing (AP is a bridge, not a router)
#   - br-lan.accept_ra = 2: accept upstream RA even if forwarding gets reset
#
# accept_ra=2 (not 1) is critical: accept_ra=1 is silently ignored by kernel
# when forwarding=1. netifd may reset forwarding=1 on interface reconfiguration,
# so accept_ra=2 forces RA reception regardless. Verified empirically: with
# accept_ra=1 AP gets no IPv6; with accept_ra=2 AP gets public IPv6 + default
# route via upstream RA.
#
# Other sysctl values (default.forwarding, br-lan.forwarding,
# accept_ra_defrtr, accept_ra_pinfo) are redundant: all.forwarding=0 already
# propagates to br-lan, and accept_ra_defrtr/pinfo default to 1 when
# accept_ra >= 1.
#
# This file is loaded by procd on every boot, after netifd creates br-lan.
# (sysctl.conf is loaded earlier and would fail for br-lan-specific settings
# since br-lan doesn't exist yet.)
net.ipv6.conf.all.forwarding = 0
net.ipv6.conf.br-lan.accept_ra = 2
